<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{{{subject}}}</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&display=swap');

    @media only screen and (max-width: 620px) {
      .email-container {
        width: 100% !important;
        max-width: 100% !important;
      }
      .email-body-padding {
        padding: 24px 20px !important;
      }
      .email-header-padding {
        padding: 20px 20px !important;
      }
      .email-footer-padding {
        padding: 20px 20px !important;
      }
      .report-card-padding {
        padding: 20px 16px !important;
      }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f5f5f5; font-family: 'Lexend', 'Montserrat', Arial, Helvetica, sans-serif; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;">
  <!-- Wrapper table -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation" style="background-color: #f5f5f5;">
    <tr>
      <td align="center" style="padding: 20px 10px;">
        <!-- Container table -->
        <table class="email-container" width="600" cellpadding="0" cellspacing="0" border="0" role="presentation" style="max-width: 600px; width: 100%; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">

          <!-- HEADER -->
          <tr>
            <td class="email-header-padding" style="background-color: #005C5C; padding: 24px 32px; text-align: center;">
              <img src="http://cdn.mcauto-images-production.sendgrid.net/3980f70febc70fb8/f043a16f-bf05-44d1-b9f6-b71d80833810/412x59.png" alt="TrashMob.eco" width="200" style="display: block; margin: 0 auto; border: 0; outline: none; text-decoration: none;">
              <p style="color: #e0f2f1; margin: 8px 0 0 0; font-size: 14px; font-family: 'Lexend', 'Montserrat', Arial, Helvetica, sans-serif; line-height: 1.4;">Meet up. Clean up. Feel good.</p>
            </td>
          </tr>

          <!-- BODY -->
          <tr>
            <td class="email-body-padding" style="padding: 32px; font-family: 'Lexend', 'Montserrat', Arial, Helvetica, sans-serif; font-size: 16px; line-height: 1.6; color: #333333;">
              <p style="margin: 0 0 16px 0; font-size: 16px; line-height: 1.6; color: #333333;">Hi {{username}},</p>
              {{{emailCopy}}}

              <!-- Litter Report Details Card -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation" style="margin: 24px 0 16px 0;">
                <tr>
                  <td class="report-card-padding" style="background-color: #e0f2f1; border: 1px solid #b2dfdb; border-radius: 8px; padding: 24px;">

                    <!-- Section Title -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation">
                      <tr>
                        <td style="padding: 0 0 16px 0; border-bottom: 1px solid #b2dfdb;">
                          <p style="margin: 0; font-size: 16px; font-weight: 700; font-family: 'Lexend', 'Montserrat', Arial, Helvetica, sans-serif; color: #005C5C;">Litter Report Details</p>
                        </td>
                      </tr>
                    </table>

                    <!-- Report Details -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation" style="margin-top: 16px;">
                      <!-- Report Name -->
                      <tr>
                        <td width="80" style="padding: 4px 0; font-size: 13px; font-family: 'Lexend', 'Montserrat', Arial, Helvetica, sans-serif; color: #666666; font-weight: 600; vertical-align: top;">Report</td>
                        <td style="padding: 4px 0; font-size: 15px; font-family: 'Lexend', 'Montserrat', Arial, Helvetica, sans-serif; color: #333333; vertical-align: top;">{{{litterReportName}}}</td>
                      </tr>
                      <!-- Location -->
                      <tr>
                        <td width="80" style="padding: 4px 0; font-size: 13px; font-family: 'Lexend', 'Montserrat', Arial, Helvetica, sans-serif; color: #666666; font-weight: 600; vertical-align: top;">Location</td>
                        <td style="padding: 4px 0; font-size: 15px; font-family: 'Lexend', 'Montserrat', Arial, Helvetica, sans-serif; color: #333333; vertical-align: top;">
                          <a href="{{{googleMapsUrl}}}" style="color: #005C5C; text-decoration: underline;">{{{eventAddress}}}</a>
                        </td>
                      </tr>
                    </table>

                    <!-- View on Map Link -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation" style="margin-top: 20px;">
                      <tr>
                        <td align="center">
                          <table cellpadding="0" cellspacing="0" border="0" role="presentation">
                            <tr>
                              <td align="center" style="background-color: #005C5C; border-radius: 6px;">
                                <a href="{{{googleMapsUrl}}}" style="display: inline-block; padding: 12px 32px; color: #ffffff; font-size: 15px; font-weight: 600; font-family: 'Lexend', 'Montserrat', Arial, Helvetica, sans-serif; text-decoration: none; border-radius: 6px; line-height: 1.2;">View on Map</a>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                    </table>

                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td class="email-footer-padding" style="background-color: #f5f5f5; padding: 24px 32px; text-align: center; border-top: 1px solid #e0e0e0;">
              <p style="color: #666666; font-size: 13px; font-family: 'Lexend', 'Montserrat', Arial, Helvetica, sans-serif; line-height: 1.5; margin: 0 0 8px 0;">Thanks,<br>The team at TrashMob.eco</p>
              <img src="http://cdn.mcauto-images-production.sendgrid.net/3980f70febc70fb8/f043a16f-bf05-44d1-b9f6-b71d80833810/412x59.png" alt="TrashMob.eco" width="120" style="display: block; margin: 8px auto; border: 0; outline: none; text-decoration: none;">
              <p style="color: #999999; font-size: 11px; font-family: 'Lexend', 'Montserrat', Arial, Helvetica, sans-serif; line-height: 1.5; margin: 12px 0 4px 0;">TrashMob.eco is a 501(c)(3) nonprofit organization.</p>
              <p style="color: #999999; font-size: 11px; font-family: 'Lexend', 'Montserrat', Arial, Helvetica, sans-serif; line-height: 1.5; margin: 4px 0 0 0;">
                <a href="<%asm_group_unsubscribe_raw_url%>" style="color: #005C5C; text-decoration: underline;">Unsubscribe</a>
                &middot;
                <a href="<%asm_preferences_raw_url%>" style="color: #005C5C; text-decoration: underline;">Manage Preferences</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
