# Workflow for building and deploying TrashMob web app as a container to Azure Container Apps

name: TrashMobDev - Container App

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/container_ca-tm-dev-westus2.yml'
      - 'TrashMob/**'
      - '!TrashMob/client-app/e2e/**'
      - '!TrashMob/client-app/playwright.config.ts'
      - 'TrashMob.Models/**'
      - 'TrashMob.Shared/**'
      - 'Deploy/containerApp.bicep'
  workflow_dispatch:

# Cancel in-progress deployments when a newer commit lands on main.
# Only the latest code matters — earlier runs deploy stale commits.
concurrency:
  group: deploy-dev
  cancel-in-progress: true

env:
  AZURE_CONTAINER_REGISTRY: acrtmdevwestus2
  CONTAINER_APP_NAME: ca-tm-dev-westus2
  RESOURCE_GROUP: rg-trashmob-dev-westus2
  IMAGE_NAME: trashmob
  CONTAINER_APPS_ENVIRONMENT: cae-tm-dev-westus2
  KEY_VAULT_NAME: kv-tm-dev-westus2
  STORAGE_ACCOUNT_NAME: stortmdevwestus2
  REGION: westus2
  CUSTOM_DOMAIN_NAME: dev.trashmob.eco
  MANAGED_CERTIFICATE_NAME: dev-trashmob-eco-cert
  STRAPI_CONTAINER_APP_NAME: ca-strapi-tm-dev-westus2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: test
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build and push container
        id: build
        uses: ./.github/actions/container-build-push
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          registry-name: ${{ env.AZURE_CONTAINER_REGISTRY }}
          image-name: ${{ env.IMAGE_NAME }}
          dockerfile: TrashMob/Dockerfile
          build-args: --build-arg BUILD_ENVIRONMENT=dev

      - name: Get Strapi FQDN
        id: get-strapi
        run: |
          # Check if Strapi container app exists
          STRAPI_EXISTS=$(az containerapp show \
            --name ${{ env.STRAPI_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query name \
            -o tsv 2>/dev/null || echo "")

          if [ -n "$STRAPI_EXISTS" ]; then
            STRAPI_FQDN=$(az containerapp show \
              --name ${{ env.STRAPI_CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query properties.configuration.ingress.fqdn \
              -o tsv)
            echo "Strapi FQDN: $STRAPI_FQDN"
            echo "strapi_url=https://$STRAPI_FQDN" >> $GITHUB_OUTPUT
          else
            echo "Strapi container app not found. CMS will be disabled."
            echo "strapi_url=" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Azure Container Apps
        run: |
          SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          CONTAINER_IMAGE="${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.build.outputs.semver }}"
          CONTAINER_APPS_ENV_ID="/subscriptions/$SUBSCRIPTION_ID/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.App/managedEnvironments/${{ env.CONTAINER_APPS_ENVIRONMENT }}"

          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file Deploy/containerApp.bicep \
            --parameters \
              containerAppName=${{ env.CONTAINER_APP_NAME }} \
              containerAppsEnvironmentId=$CONTAINER_APPS_ENV_ID \
              containerRegistryName=${{ env.AZURE_CONTAINER_REGISTRY }} \
              containerImage=$CONTAINER_IMAGE \
              keyVaultName=${{ env.KEY_VAULT_NAME }} \
              storageAccountName=${{ env.STORAGE_ACCOUNT_NAME }} \
              region=${{ env.REGION }} \
              environment=dev \
              minReplicas=1 \
              maxReplicas=3 \
              customDomainName=${{ env.CUSTOM_DOMAIN_NAME }} \
              managedCertificateName=${{ env.MANAGED_CERTIFICATE_NAME }} \
              strapiBaseUrl="${{ steps.get-strapi.outputs.strapi_url }}"

      # Note: Azure AD Entra External ID configuration is set via environment variables in containerApp.bicep

      - name: Grant Key Vault and Storage Access via RBAC
        uses: ./.github/actions/grant-rbac
        with:
          resource-type: app
          resource-name: ${{ env.CONTAINER_APP_NAME }}
          resource-group: ${{ env.RESOURCE_GROUP }}
          key-vault-name: ${{ env.KEY_VAULT_NAME }}
          storage-account-name: ${{ env.STORAGE_ACCOUNT_NAME }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Grant Azure Maps Access via RBAC
        run: |
          echo "Getting Container App managed identity..."
          PRINCIPAL_ID=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query identity.principalId \
            -o tsv)
          echo "Principal ID: $PRINCIPAL_ID"

          # Deploy Azure Maps bicep to create role assignment and get client ID
          echo "Deploying Azure Maps role assignment..."
          DEPLOY_OUTPUT=$(az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file Deploy/azureMaps.bicep \
            --parameters \
              environment=dev \
              region=${{ env.REGION }} \
              containerAppPrincipalId=$PRINCIPAL_ID \
            --query "properties.outputs.azureMapsClientId.value" \
            -o tsv)

          echo "Azure Maps Client ID: $DEPLOY_OUTPUT"

          # Store Azure Maps Client ID in Key Vault
          echo "Storing Azure Maps Client ID in Key Vault..."
          az keyvault secret set \
            --vault-name ${{ env.KEY_VAULT_NAME }} \
            --name AzureMapsClientId \
            --value "$DEPLOY_OUTPUT" \
            --output none

          echo "Azure Maps managed identity access configured successfully"

      - name: Restart Container App
        run: |
          echo "Restarting container app to pick up Key Vault permissions..."
          REVISION=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[0].name" \
            -o tsv)

          az containerapp revision restart \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --revision $REVISION

      - name: Get Container App URL
        id: get-url
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            -o tsv)
          echo "Container App URL: https://$FQDN"
          echo "fqdn=$FQDN" >> $GITHUB_OUTPUT

      - name: Logout from Azure
        if: always()
        run: az logout
