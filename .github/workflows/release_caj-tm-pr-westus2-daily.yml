# Workflow for building and deploying TrashMobDailyJobs container to production Azure Container Apps Job

name: TrashMobProd - Daily Container App Job

on:
  push:
    branches:
      - release
    paths:
      - '.github/workflows/release_caj-tm-pr-westus2-daily.yml'
      - 'TrashMobDailyJobs/**'
      - 'TrashMob.Models/**'
      - 'TrashMob.Shared/**'
      - 'Deploy/containerAppJobDaily.bicep'
  workflow_dispatch:

# Cancel in-progress deployments when a newer commit lands on release.
# Only the latest code matters — earlier runs deploy stale commits.
concurrency:
  group: deploy-prod-daily
  cancel-in-progress: true

env:
  AZURE_CONTAINER_REGISTRY: acrtmprwestus2
  CONTAINER_APP_JOB_NAME: caj-tm-pr-westus2-daily
  RESOURCE_GROUP: rg-trashmob-pr-westus2
  IMAGE_NAME: trashmobdailyjobs
  CONTAINER_APPS_ENVIRONMENT: cae-tm-pr-westus2
  KEY_VAULT_NAME: kv-tm-pr-westus2
  AZURE_MAPS_NAME: map-tm-pr-westus2
  STORAGE_ACCOUNT_NAME: stortmprwestus2
  REGION: westus2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build and push container
        id: build
        uses: ./.github/actions/container-build-push
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          registry-name: ${{ env.AZURE_CONTAINER_REGISTRY }}
          image-name: ${{ env.IMAGE_NAME }}
          dockerfile: TrashMobDailyJobs/Dockerfile

      - name: Deploy to Azure Container Apps Job
        run: |
          SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          CONTAINER_IMAGE="${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.build.outputs.semver }}"
          CONTAINER_APPS_ENV_ID="/subscriptions/$SUBSCRIPTION_ID/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.App/managedEnvironments/${{ env.CONTAINER_APPS_ENVIRONMENT }}"

          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file Deploy/containerAppJobDaily.bicep \
            --parameters \
              containerAppJobName=${{ env.CONTAINER_APP_JOB_NAME }} \
              containerAppsEnvironmentId=$CONTAINER_APPS_ENV_ID \
              containerRegistryName=${{ env.AZURE_CONTAINER_REGISTRY }} \
              containerImage=$CONTAINER_IMAGE \
              keyVaultName=${{ env.KEY_VAULT_NAME }} \
              azureMapsName=${{ env.AZURE_MAPS_NAME }} \
              storageAccountName=${{ env.STORAGE_ACCOUNT_NAME }} \
              region=${{ env.REGION }} \
              environment=pr \
              cronExpression='0 0,12 * * *'

      - name: Grant Permissions to Container App Job
        uses: ./.github/actions/grant-rbac
        with:
          resource-type: job
          resource-name: ${{ env.CONTAINER_APP_JOB_NAME }}
          resource-group: ${{ env.RESOURCE_GROUP }}
          key-vault-name: ${{ env.KEY_VAULT_NAME }}
          storage-account-name: ${{ env.STORAGE_ACCOUNT_NAME }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Container App Job
        run: |
          az containerapp job show \
            --name ${{ env.CONTAINER_APP_JOB_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.scheduleTriggerConfig.cronExpression" \
            -o tsv

      - name: Logout from Azure
        if: always()
        run: az logout
