# Workflow for building and deploying the Auth Extension as a container to Azure Container Apps

name: TrashMobProd - Auth Extension Container App

on:
  push:
    branches:
      - release
    paths:
      - '.github/workflows/release_ca-authext-tm-pr-westus2.yml'
      - 'TrashMob.AuthExtension/**'
      - 'Deploy/containerAppAuthExtension.bicep'
  workflow_dispatch:

# Cancel in-progress deployments when a newer commit lands on release.
# Only the latest code matters — earlier runs deploy stale commits.
concurrency:
  group: deploy-pr-authext
  cancel-in-progress: true

env:
  AZURE_CONTAINER_REGISTRY: acrtmprwestus2
  CONTAINER_APP_NAME: ca-authext-tm-pr-westus2
  RESOURCE_GROUP: rg-trashmob-pr-westus2
  IMAGE_NAME: trashmob-authext
  CONTAINER_APPS_ENVIRONMENT: cae-tm-pr-westus2
  REGION: westus2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build and push container
        id: build
        uses: ./.github/actions/container-build-push
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          registry-name: ${{ env.AZURE_CONTAINER_REGISTRY }}
          image-name: ${{ env.IMAGE_NAME }}
          dockerfile: TrashMob.AuthExtension/Dockerfile

      - name: Deploy to Azure Container Apps
        run: |
          SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          CONTAINER_IMAGE="${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.build.outputs.semver }}"
          CONTAINER_APPS_ENV_ID="/subscriptions/$SUBSCRIPTION_ID/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.App/managedEnvironments/${{ env.CONTAINER_APPS_ENVIRONMENT }}"

          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file Deploy/containerAppAuthExtension.bicep \
            --parameters \
              containerAppName=${{ env.CONTAINER_APP_NAME }} \
              containerAppsEnvironmentId=$CONTAINER_APPS_ENV_ID \
              containerRegistryName=${{ env.AZURE_CONTAINER_REGISTRY }} \
              containerImage=$CONTAINER_IMAGE \
              region=${{ env.REGION }} \
              environment=pr \
              authExtensionTenantId=${{ secrets.ENTRA_TENANT_ID }} \
              authExtensionClientId=${{ secrets.AUTH_EXTENSION_CLIENT_ID }}

      - name: Output Container App URL
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            -o tsv)

          echo "Auth Extension URL: https://$FQDN"
          echo "Endpoint: https://$FQDN/api/authext/attributecollectionsubmit"

      - name: Logout from Azure
        if: always()
        run: az logout
