# Workflow for syncing redesigned SendGrid email templates to SendGrid on release

name: Sync SendGrid Templates

on:
  push:
    branches:
      - release
    paths:
      - 'Planning/SendGridTemplates/redesigned/**'
  workflow_dispatch:

jobs:
  sync-templates:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get SendGrid API key from Key Vault
        id: get-key
        run: |
          SENDGRID_KEY=$(az keyvault secret show --vault-name kv-tm-pr-westus2 --name sendGridApiKey --query "value" -o tsv)
          echo "::add-mask::$SENDGRID_KEY"
          echo "sendgrid_api_key=$SENDGRID_KEY" >> $GITHUB_OUTPUT

      - name: Upload SendGrid templates
        run: bash scripts/sendgrid-upload-templates.sh
        env:
          SENDGRID_API_KEY: ${{ steps.get-key.outputs.sendgrid_api_key }}

      - name: Logout from Azure
        if: always()
        run: az logout
