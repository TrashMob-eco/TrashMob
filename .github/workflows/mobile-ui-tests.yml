name: Mobile UI Tests (Appium)

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Test filter (e.g. "Category=Authenticated", "FullyQualifiedName~AppLaunch", or leave blank for all)'
        required: false
        default: ''

jobs:
  appium-tests:
    name: Android Appium Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Build Android app
        run: dotnet build TrashMobMobile/TrashMobMobile.csproj -f net10.0-android -p:AndroidSdkDirectory=$ANDROID_SDK_ROOT -p:TargetFrameworks=net10.0-android

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Run Appium tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          emulator-boot-timeout: 600
          disable-animations: true
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            echo "Emulator started"
            adb devices

            # Install the pre-built APK directly (avoids 17-min rebuild)
            APK_PATH=$(find TrashMobMobile/bin -name "*.apk" -path "*/net10.0-android/*" | head -1)
            echo "Installing APK: $APK_PATH"
            adb install -r "$APK_PATH"

            # Start Appium in the background
            appium &
            sleep 5

            # Run the tests
            TEST_FILTER="${{ github.event.inputs.test_filter }}"
            if [ -n "$TEST_FILTER" ]; then
              dotnet test TrashMobMobile.UITests/ --filter "$TEST_FILTER" --logger "trx;LogFileName=results.trx" || true
            else
              dotnet test TrashMobMobile.UITests/ --logger "trx;LogFileName=results.trx" || true
            fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-results
          path: |
            TrashMobMobile.UITests/TestResults/
          retention-days: 14

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-screenshots
          path: |
            TrashMobMobile.UITests/**/Screenshots/
          retention-days: 14
