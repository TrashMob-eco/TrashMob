name: Mobile UI Tests (Appium) [Experimental]

# EXPERIMENTAL: Android emulators on GitHub Actions runners are unstable for MAUI + Appium.
# Known issues: GPU memory errors on macOS ARM, boot timeouts on Ubuntu, broken pipe on install.
# These tests work locally — run with: appium & dotnet test TrashMobMobile.UITests/
# Revisit CI when GitHub Actions improves ARM emulator support.

on:
  workflow_dispatch:

jobs:
  appium-tests:
    name: Android Appium Tests
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Run Appium tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: arm64-v8a
          emulator-boot-timeout: 900
          disable-animations: true
          force-avd-creation: true
          emulator-options: -no-window -gpu auto -noaudio -no-boot-anim
          script: |
            echo "=== Building and installing app ==="
            dotnet publish TrashMobMobile/TrashMobMobile.csproj -f net10.0-android -c Release -p:AndroidSdkDirectory=$ANDROID_SDK_ROOT -p:TargetFrameworks=net10.0-android -p:AndroidKeyStore=false
            echo "Installing app..."
            adb install -r -g TrashMobMobile/bin/Release/net10.0-android/publish/eco.trashmob.trashmobmobileapp-Signed.apk || sleep 10 && adb install -r -g TrashMobMobile/bin/Release/net10.0-android/publish/eco.trashmob.trashmobmobileapp-Signed.apk
            echo "=== Pre-installing Appium helpers ==="
            APPIUM_HOME=$(appium --show-config 2>/dev/null | grep -o '"APPIUM_HOME":"[^"]*"' | cut -d'"' -f4 || echo "$HOME/.appium")
            find "$APPIUM_HOME" -name "*.apk" -exec adb install -r -g {} \; || true
            echo "=== Starting Appium ==="
            appium --relaxed-security &
            sleep 15
            curl -s http://127.0.0.1:4723/status || echo "Appium not responding yet"
            sleep 5
            echo "=== Running tests ==="
            dotnet test TrashMobMobile.UITests/ --logger "trx;LogFileName=results.trx" || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-results
          path: TrashMobMobile.UITests/TestResults/
          retention-days: 7

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-screenshots
          path: TrashMobMobile.UITests/**/Screenshots/
          retention-days: 7
