name: Build iOS app

on:
    workflow_call:
        inputs:
            environment:
                required: true
                type: string
            configuration:
                required: true
                type: string
            build_number:
                required: true
                type: string
            bundle_id:
                required: true
                type: string
            dotnet_version:
                required: true
                type: string
            ios_provisioning_profile_type:
                required: true
                type: string
            version:
                required: false
                type: string
            define_constants:
                required: true
                type: string

        secrets:
            ios_signing_certificate:
                required: true
            ios_signing_certificate_password:
                required: true
            apple_issuer_id:
                required: true
            apple_key_id:
                required: true
            apple_key:
                required: true
            appsettings:
                required: true
        outputs:
            artifact_name:
                value: artifacts-ios-${{ inputs.build_number }}


                

jobs:
    build:
        runs-on: macos-26
        environment: ${{ inputs.environment }}
        name: iOS Build

        steps:
        - name: Checkout
          uses: actions/checkout@v6
          with:
            fetch-depth: 0

        - name: Install GitVersion
          uses: gittools/actions/gitversion/setup@v3.2.1
          with:
            versionSpec: '5.x'
    
        - name: Determine Version
          id: version_step # step id used as reference for output values
          uses: gittools/actions/gitversion/execute@v3.2.1

        - name: Update Build Number
          run: sed -i '' "s|<ApplicationVersion>.*</ApplicationVersion>|<ApplicationVersion>${{ env.semVer }}</ApplicationVersion>|g" TrashMobMobile/TrashMobMobile.csproj

        - name: Update Version Number
          run: sed -i '' "s|<ApplicationDisplayVersion>.*</ApplicationDisplayVersion>|<Version>${{ env.semVer }}</Version>|g" TrashMobMobile/TrashMobMobile.csproj

        - name: Update Bundle ID
          run: sed -i '' "s|<ApplicationId>.*</ApplicationId>|<ApplicationId>${{ inputs.bundle_id }}</ApplicationId>|g" TrashMobMobile/TrashMobMobile.csproj

        - name: Update defined constants
          run: sed -i '' "s|<DefineConstants>USETEST</DefineConstants>|<DefineConstants>${{ inputs.define_constants }}</DefineConstants>|g" TrashMobMobile/TrashMobMobile.csproj

        - name: Setup DotNet ${{ inputs.dotnet_version }} Environment
          uses: actions/setup-dotnet@v5
          with:
            dotnet-version: ${{ inputs.dotnet_version }}

        - name: List available Xcode versions
          if: runner.os == 'macOS'
          shell: bash
          run: |
            ls /Applications | grep Xcode || true
            xcodebuild -version || true

        - name: Cache NuGet packages
          uses: actions/cache@v5
          with:
            path: ~/.nuget/packages
            key: nuget-ios-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
            restore-keys: |
              nuget-ios-${{ runner.os }}-

        - name: Install MAUI Workload
          env:
            DOTNET_MULTILEVEL_LOOKUP: 0
            DOTNET_ROLL_FORWARD: Disable
          run: |
            dotnet workload install maui --ignore-failed-sources --source https://api.nuget.org/v3/index.json
            dotnet workload install maui-ios --ignore-failed-sources --source https://api.nuget.org/v3/index.json

        - name: Set XCode Version
          # .NET-iOS SDK 26.5.10284 (pulled by `dotnet workload install maui-ios`) requires
          # Xcode 26.5. On the macos-26 runner image, Xcode 26.5 is currently only shipped
          # as a Beta (e.g. /Applications/Xcode_26.5_beta_2.app), and maxim-lobanov/setup-xcode
          # filters out non-stable versions, so the action can't resolve a `26.5` pin.
          # Switch via xcode-select directly through the version symlink — once Apple ships
          # 26.5 GM and Microsoft promotes it on the runner, swap this back to setup-xcode.
          if: runner.os == 'macOS'
          run: |
            sudo xcode-select -switch /Applications/Xcode_26.5.app
            xcodebuild -version

        - name: Import Code-Signing Certificates
          uses: Apple-Actions/import-codesign-certs@v6
          with:
            p12-file-base64: ${{ secrets.ios_signing_certificate }}
            p12-password: ${{ secrets.ios_signing_certificate_password }}

        - name: Download Apple Provisioning Profiles
          uses: Apple-Actions/download-provisioning-profiles@v5
          with:
            bundle-id: ${{ inputs.bundle_id }}
            profile-type: ${{ inputs.ios_provisioning_profile_type }}
            issuer-id: ${{ secrets.apple_issuer_id }}
            api-key-id: ${{ secrets.apple_key_id }}
            api-private-key: ${{ secrets.apple_key }}

        - name: Build MAUI iOS
          run: dotnet publish TrashMobMobile/TrashMobMobile.csproj -c ${{ inputs.configuration }} -f net10.0-ios -r ios-arm64

        - name: Upload iOS Artifact
          uses: actions/upload-artifact@v7.0.0
          with:
            name: artifacts-ios-${{ inputs.build_number }}
            path: TrashMobMobile/bin/${{ inputs.configuration }}/net10.0-ios/ios-arm64/publish//*.ipa
